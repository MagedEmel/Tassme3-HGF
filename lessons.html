<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>مسابقة الحفظ 2026 برج حصين</title>
    <link rel="icon" href="imgs/IMG_1185.JPG.jpeg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
      rel="stylesheet" />

    <link href="https://fonts.cdnfonts.com/css/ostouri" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Ostouri", "Cairo", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;

        background:
          linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)),
          url("imgs/logo.png");

        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;

        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        backdrop-filter: blur(2px);
        z-index: -1;
      }

      .floating {
        position: fixed;
        width: 250px;
        height: 250px;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
        animation: float 8s infinite alternate ease-in-out;
      }

      .f1 {
        background: #d4af37;

        top: -50px;
        left: -50px;
      }

      .f2 {
        background: #f5d76e;
        bottom: -50px;
        right: -50px;
        animation-delay: 2s;
      }

      .f3 {
        background: #b8860b;
        top: 50%;
        left: 40%;
        animation-delay: 4s;
      }

      @keyframes float {
        from {
          transform: translateY(0) scale(1);
        }

        to {
          transform: translateY(-50px) scale(1.2);
        }
      }

      .hero {
        padding: 70px 20px 40px;
        text-align: center;
      }

      .hero h1 {
        color: white;
        font-size: 60px;
        font-weight: 800;
        margin-bottom: 15px;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from {
          text-shadow: 0 0 10px #fff;
        }

        to {
          text-shadow:
            0 0 20px #60a5fa,
            0 0 40px #2563eb;
        }
      }

      .hero p {
        color: #d1d5db;
        font-size: 20px;
      }

      .container {
        width: 90%;
        max-width: 1400px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        padding-bottom: 70px;
      }

      .card {
        position: relative;
        overflow: hidden;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        padding: 30px 25px;
        transition: 0.5s;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.35);
        animation: fadeUp 1s ease forwards;
        opacity: 0;
      }

      .card:nth-child(1) {
        animation-delay: 0.1s;
      }

      .card:nth-child(2) {
        animation-delay: 0.2s;
      }

      .card:nth-child(3) {
        animation-delay: 0.3s;
      }

      .card:nth-child(4) {
        animation-delay: 0.4s;
      }

      .card:nth-child(5) {
        animation-delay: 0.5s;
      }

      .card:nth-child(6) {
        animation-delay: 0.6s;
      }

      .card:nth-child(7) {
        animation-delay: 0.7s;
      }

      .card:nth-child(8) {
        animation-delay: 0.8s;
      }

      .card:nth-child(9) {
        animation-delay: 0.9s;
      }

      @keyframes fadeUp {
        from {
          transform: translateY(50px);
          opacity: 0;
        }

        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .card:hover {
        transform: translateY(-15px) scale(1.03);

        box-shadow:
          0 0 30px rgba(212, 175, 55, 0.5),
          0 0 80px rgba(255, 215, 0, 0.2);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        .card::before {
          background: linear-gradient(
            45deg,
            #d4af37,
            #f5d76e,
            #b8860b,
            #fff3c4,
            #d4af37
          );
        }
        z-index: -1;
        background-size: 300%;
        animation: borderMove 6s linear infinite;
      }

      @keyframes borderMove {
        0% {
          background-position: 0 0;
        }

        100% {
          background-position: 300% 0;
        }
      }

      .card-inner {
        background: rgba(0, 0, 0, 0.55);
        border-radius: 28px;
        padding: 30px 20px;
      }

      .stage {
        color: white;
        font-size: 35px;
        font-weight: 800;
        margin-bottom: 15px;
      }

      .desc {
        color: #d1d5db;
        margin-bottom: 25px;
        line-height: 1.7;
        direction: rtl;
      }

      .btns {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .btn {
        padding: 15px;
        border-radius: 15px;
        text-decoration: none;
        text-align: center;
        color: white;
        font-weight: 700;
        transition: 0.4s;
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.2);
        transition: 0.5s;
      }

      .btn:hover::before {
        left: 100%;
      }

      .pdfBtn {
        background: linear-gradient(45deg, #b8860b, #d4af37);
      }

      .imgBtn {
        background: linear-gradient(45deg, #8b5e00, #f5d76e);
      }

      .btn:hover {
        transform: scale(1.05);
        cursor: pointer;
      }

      .footer {
        text-align: center;
        color: #d1d5db;
        padding: 30px;
        font-size: 18px;
      }

      @media (max-width: 700px) {
        .hero h1 {
          font-size: 40px;
        }

        .hero p {
          font-size: 16px;
        }
      }
      .hero {
        padding: 60px 20px 40px;
        text-align: center;
      }

      .topText {
        color: #f8e7a1;
        font-size: 20px;
        line-height: 1.8;
        margin-bottom: 20px;

        text-shadow:
          0 0 10px rgba(95, 81, 0, 0.5),
          0 0 25px rgba(70, 59, 0, 0.3);
      }

      .subText {
        color: #fff3c4;
        font-size: 22px;
        margin-bottom: 25px;

        text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      }

      .mainTitle {
        font-size: 45px;
        font-weight: 800;
        color: white;

        margin-bottom: 20px;

        text-shadow:
          0 0 20px #d4af37,
          0 0 40px #b8860b,
          0 0 60px rgba(255, 215, 0, 0.5);

        animation: titleGlow 2s infinite alternate;
      }

      .heroDesc {
        color: #f3f4f6;
        font-size: 16px;
        letter-spacing: 1px;
      }

      @keyframes titleGlow {
        from {
          transform: scale(1);
        }

        to {
          transform: scale(1.03);
        }
      }
    </style>
  </head>

  <body>
    <div class="floating f1"></div>
    <div class="floating f2"></div>
    <div class="floating f3"></div>

    <section class="hero">
      <h2 class="topText">
        خدمة التربية الكنسية<br />
        مدارس أحد ابتدائي بنين<br />
        بكنيسة ماريوحنا الحبيب بنجع حمادي
      </h2>

      <h3 class="subText">خدمة الأرشدياكون حبيب جرجس</h3>

      <h1 class="mainTitle">مسابقة الحفظ</h1>
      <h1 class="mainTitle">برج حصين</h1>
    </section>

    <div class="container" id="container"></div>

    <script>
      const stages = [
        {
          name: "BC",
          folder: "BC",
          pdf: "bc.pdf",
          imageName: "BC",
          images: 8,
        },

        {
          name: "KG1",
          folder: "KG1",
          pdf: "kg1.pdf",
          imageName: "KG1",
          images: 8,
        },

        {
          name: "KG2",
          folder: "KG2",
          pdf: "KG2.pdf",
          imageName: "KG2",
          images: 8,
        },

        {
          name: "اولي ابتدائي",
          folder: "1",
          pdf: "اولي ابتدائي.pdf",
          imageName: "اولي ابتدائي",
          images: 12,
        },

        {
          name: "تانية ابتدائي",
          folder: "2",
          pdf: "تانية ابتدائي.pdf",
          imageName: "تانية ابتدائي",
          images: 12,
        },

        {
          name: "تالتة ابتدائي",
          folder: "3",
          pdf: "تالتة ابتدائي.pdf",
          imageName: "تالتة ابتدائي",
          images: 16,
        },

        {
          name: "رابعة ابتدائي",
          folder: "4",
          pdf: "رابعة ابتدائي.pdf",
          imageName: "رابعة ابتدائي",
          images: 20,
        },

        {
          name: "خامسة ابتدائي",
          folder: "5",
          pdf: "خامسة ابتدائي.pdf",
          imageName: "خامسة ابتدائي",
          images: 20,
        },

        {
          name: "ساتة ابتدائي",
          folder: "6",
          pdf: "ساتة ابتدائي.pdf",
          imageName: "ساتة ابتدائي",
          images: 20,
        },
      ];
      const container = document.getElementById("container");

      stages.forEach((stage) => {
        container.innerHTML += `
    <div class="card">
      <div class="card-inner">

        <div class="stage">
          ${stage.name}
        </div>

        <div class="desc">
          أضغط لتحميل المسابقة كـ PDF او صور
        </div>

        <div class="btns">

          <a
            class="btn pdfBtn"
            href="pdfs/${stage.folder}/${stage.pdf}"
            download
          >
            📄 Download PDF
          </a>

          <a
            class="btn imgBtn"
            onclick="downloadImages(
              '${stage.folder}',
              '${stage.imageName}',
              ${stage.images}
            )"
          >
            🖼 Download Images
          </a>

        </div>

      </div>
    </div>
  `;
      });
      function downloadImages(folder, imageName, totalImages) {
        let i = 1;

        const interval = setInterval(() => {
          const link = document.createElement("a");

          link.href = `pdfs/${folder}/${imageName}-${i}.png`;

          link.download = `${imageName}-${i}.png`;

          document.body.appendChild(link);

          link.click();

          document.body.removeChild(link);

          i++;

          if (i > totalImages) {
            clearInterval(interval);
          }
        }, 1500);
      }
    </script>
  </body>
</html>
