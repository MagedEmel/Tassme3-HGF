<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>مسابقة الحفظ برج حصين</title>
    <link rel="icon" href="imgs/IMG_1185.JPG.jpeg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.cdnfonts.com/css/ostouri" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Ostouri", "Cairo", sans-serif;

        min-height: 100vh;

        overflow-x: hidden;

        background:
          linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.55)),
          url("imgs/Logo HQ.png");

        background-size: cover;

        background-position: center;

        background-repeat: no-repeat;

        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 80%;
        height: 100%;

        border-radius: 30px;

        border: 1px solid rgba(255, 255, 255, 0.15);

        backdrop-filter: blur(5px);
        display: flex;
        padding: 25px 0;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        box-shadow:
          0 0 25px rgba(0, 0, 0, 0.589),
          0 0 60px rgba(212, 175, 55, 0.418);
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(50px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .title {
        color: #fff3c4;

        font-size: 55px;

        margin-bottom: 25px;

        text-shadow:
          0 0 15px #d4af37,
          0 0 30px rgba(255, 215, 0, 0.5);
      }

      .imageBox {
        width: 300px;
        height: 400px;

        margin: auto;

        border-radius: 30px;

        overflow: hidden;

        border: 6px solid #d4af37;

        box-shadow:
          0 0 30px rgba(255, 215, 0, 0.5),
          0 0 60px rgba(255, 215, 0, 0.25);

        animation: float 4s infinite alternate ease-in-out;
      }

      .imageBox img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      @keyframes float {
        from {
          transform: translateY(0px);
        }

        to {
          transform: translateY(-15px);
        }
      }

      .desc {
        text-align: center;
        margin-top: 35px;

        color: #f3f4f6;

        line-height: 2;

        font-size: 24px;
      }

      .btn {
        display: inline-block;

        margin-top: 40px;

        padding: 18px 45px;

        border-radius: 18px;

        text-decoration: none;

        color: white;

        font-size: 24px;

        background: linear-gradient(45deg, #b8860b, #f5d76e);

        transition: 0.4s;

        box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
      }

      .btn:hover {
        transform: scale(1.08);

        box-shadow:
          0 0 35px rgba(255, 215, 0, 0.7),
          0 0 80px rgba(255, 215, 0, 0.3);
      }

      @media (max-width: 700px) {
        .title {
          font-size: 38px;
        }

        .desc {
          font-size: 20px;
        }

        .imageBox {
          width: 215px;
          height: 280px;
        }

        .imageBox img {
          width: 100%;
          height: 100%;
          object-fit: contain;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1 class="title">مسابقة الحفظ</h1>
      <h1 class="title">برج حصين</h1>

      <div class="imageBox">
        <img src="imgs/IMG_1185.JPG.jpeg" />
      </div>

      <div class="desc">
        رحلة جميلة مع أولادنا في الحفظ والصلاة ومحبة ربنا ❤️
      </div>

      <a href="notes.html" class="btn"> متابعة التعليمات </a>
    </div>
  </body>
</html>
