<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="imgs/Logo HQ.png" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <title>Tassme3 HGF</title>
  </head>
  <body>
    <header>
      <nav>
        <button id="backword"><i class="fa-solid fa-backward"></i></button>
        <h1 id="grade">BC</h1>
      </nav>
    </header>
    <h2 class="totalStudnetText">
      عدد الفرقة كلها : <span id="totalStudents">0</span>
    </h2>

    <section id="hero">
      <div class="container">
        <div>
          <div class="controls">
            <div>
              <input id="studentName" placeholder="اسم الطالب" />

              <button onclick="addStudent()">إضافة</button>
            </div>
            <div class="search-box">
              <input
                type="text"
                id="search"
                placeholder="ابحث عن طالب"
                oninput="searchSuggestions()" />

              <div id="suggestions"></div>
            </div>
          </div>

          <div class="table-wrapper">
            <table id="table">
              <thead>
                <tr></tr>
              </thead>

              <tbody class="data"></tbody>
            </table>
          </div>

          <div class="show-more-box">
            <button id="showAllBtn">عرض الكل</button>
          </div>
        </div>
      </div>
    </section>
    <script type="module" src="main.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  </body>
</html>
