<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="imgs/Logo.png" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <title>Tassme3 HGF</title>
  </head>
  <body>
    <header>
      <nav>
        <button id="backword">
          <i class="fa-solid fa-backward"></i>
        </button>

        <h2 id="grade">BC</h2>
        <div class="title-box">
          <h1 class="main-title">برج حصين</h1>
          <p class="sub-title">مسابقة الحقظ 2026</p>
        </div>
      </nav>
    </header>

    <h3 id="messge"></h3>

    <h2 class="totalStudnetText">
      عدد الفرقة : <span id="totalStudents">0</span>
    </h2>

    <section id="hero">
      <div class="container">
        <div>
          <div class="controls">
            <!-- <input type="file" id="excelInput" /> -->
            <div>
              <input id="studentName" placeholder="اسم الطالب" />

              <button onclick="addStudent()">إضافة</button>
            </div>
            <div class="search-box">
              <input
                type="text"
                id="search"
                placeholder="ابحث عن طالب"
                oninput="searchSuggestions()" />

              <button id="searchBtn">عرض</button>

              <div id="suggestions"></div>
            </div>
          </div>

          <div class="table-wrapper">
            <table id="table">
              <thead>
                <tr></tr>
              </thead>

              <tbody class="data"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- =========================
     Confirm Popup
========================= -->

    <div id="confirmPopup" class="popup-overlay">
      <div class="popup-box">
        <h2>تأكيد التعديل</h2>

        <p id="popupText"></p>

        <div class="popup-buttons">
          <button id="cancelBtn">إلغاء</button>

          <button id="confirmBtn">تأكيد</button>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  </body>
</html>
